<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #search-box {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px;
      }

      /* img{
        text-align: center;
      } */
    </style>
  </head>
  <body>
    <label id="search-box" for="search-box">
      <svg
        id="search-icon"
        xmlns="http://www.w3.org/2000/svg"
        x="0px"
        y="0px"
        width="25"
        height="25"
        viewBox="0 0 50 50"
      >
        <path
          d="M 21 3 C 11.622998 3 4 10.623005 4 20 C 4 29.376995 11.622998 37 21 37 C 24.712383 37 28.139151 35.791079 30.9375 33.765625 L 44.085938 46.914062 L 46.914062 44.085938 L 33.886719 31.058594 C 36.443536 28.083 38 24.223631 38 20 C 38 10.623005 30.377002 3 21 3 z M 21 5 C 29.296122 5 36 11.703883 36 20 C 36 28.296117 29.296122 35 21 35 C 12.703878 35 6 28.296117 6 20 C 6 11.703883 12.703878 5 21 5 z"
        ></path>
      </svg>
      <form id="search-form">
        <input id="search-input" type="search" />
      </form>
    </label>

    <img src="#" />

    <script>
      const form = document.querySelector("#search-form");
      const inputBox = document.getElementById("search-input");
      const imageTag = document.querySelector("img");
      let searchInput;
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        searchInput = inputBox.value;
        console.log(searchInput);
        if (!searchInput) return;

        gifSearch(searchInput);
      });

      function gifSearch(search) {
        fetch(
          `https://httpstat.us/404`,
        )
          .then(function (response) {
            if (!response.ok) {
              throw new Error(`Http Error: ${response.status}`);
            }
            return response.json();
          })
          .then(function (response) {
            imageTag.src = response.data.images.original.url;
          })
          .catch(function (error) {
            console.error("Handled Error : ",error);
          });
      }
    </script>
  </body>
</html>
